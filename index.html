<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ミプリンの冒険 v2.5 — Cute Edition</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#ffe8f0;display:flex;justify-content:center;align-items:center;overflow:hidden}
canvas{image-rendering:pixelated;width:960px;height:540px;max-width:100vw;max-height:100vh;background:#000}
</style>
</head>
<body>
<canvas id="c" width="960" height="540"></canvas>
<script>
'use strict';

/* ===== CONSTANTS ===== */
const CW=960,CH=540,TILE=48,COLS=20,ROWS=11,FPS=60;
const cvs=document.getElementById('c'),ctx=cvs.getContext('2d');

/* ===== INPUT ===== */
const keys={},pressed={};
window.addEventListener('keydown',e=>{if(!keys[e.code])pressed[e.code]=true;keys[e.code]=true;e.preventDefault();});
window.addEventListener('keyup',e=>{keys[e.code]=false;});
function isDown(c){return!!keys[c]}
function wasPressed(c){const v=!!pressed[c];pressed[c]=false;return v}

/* ===== AUDIO CONTEXT (init on first input) ===== */
let actx=null;
function initAudio(){if(!actx){actx=new(window.AudioContext||window.webkitAudioContext)()}if(actx.state==='suspended')actx.resume()}
window.addEventListener('keydown',initAudio,{once:false});

function playSE(freq,dur,type,vol){
  if(!actx)return;
  const o=actx.createOscillator(),g=actx.createGain();
  o.type=type||'sine';o.frequency.value=freq*(0.95+Math.random()*0.1);
  g.gain.value=vol||0.15;g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);
  o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+dur);
}
function seAttack(){playSE(880,0.08,'square',0.1);playSE(1200,0.06,'sine',0.08)}
function seHit(){playSE(600,0.1,'sine',0.12);playSE(900,0.05,'sine',0.08)}
function seKill(){playSE(1400,0.15,'sine',0.12);playSE(1800,0.1,'sine',0.08);playSE(700,0.2,'triangle',0.1)}
function seHurt(){playSE(200,0.2,'sawtooth',0.1);playSE(150,0.15,'square',0.08)}
function seDash(){playSE(500,0.1,'sine',0.08);playSE(800,0.06,'sine',0.06)}
function seClear(){for(let i=0;i<5;i++)setTimeout(()=>playSE(800+i*200,0.2,'sine',0.1),i*80)}
function seSelect(){playSE(1000,0.1,'sine',0.1);playSE(1500,0.08,'sine',0.08)}
function seBless(){playSE(600,0.15,'sine',0.12);playSE(900,0.12,'sine',0.1);playSE(1200,0.1,'sine',0.08)}

/* ===== UTILS ===== */
function clamp(v,lo,hi){return v<lo?lo:v>hi?hi:v}
function rectOverlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function lerp(a,b,t){return a+(b-a)*t}
function rnd(a,b){return a+Math.random()*(b-a)}
function rndInt(a,b){return Math.floor(rnd(a,b+1))}
function tileAt(map,c,r){if(c<0||c>=COLS||r<0||r>=ROWS)return 1;return map[r*COLS+c]}

/* ===== SPRITE LOADER ===== */
const spriteImg=new Image();
spriteImg.src='assets/mipurin.png';
let spriteLoaded=false;
spriteImg.onload=()=>{spriteLoaded=true};
// 500x500, 2x2 grid => each frame 250x250
// Layout: top-left=front(down), top-right=back(up), bottom-left=left, bottom-right=right
const SPRITE_FRAMES={
  down:{sx:0,sy:0,sw:250,sh:250},
  up:{sx:250,sy:0,sw:250,sh:250},
  left:{sx:0,sy:250,sw:250,sh:250},
  right:{sx:250,sy:250,sw:250,sh:250}
};

/* ===== THEMES (Pastel cute) ===== */
const THEMES=[
  {name:'はらっぱ',bg:'#c8e6c9',wall:'#81c784',floor:'#e8f5e9',accent:'#66bb6a',deco:'🌸'},
  {name:'おかしの国',bg:'#f8bbd0',wall:'#f06292',floor:'#fce4ec',accent:'#ec407a',deco:'🍬'},
  {name:'ほしぞら',bg:'#c5cae9',wall:'#7986cb',floor:'#e8eaf6',accent:'#5c6bc0',deco:'⭐'},
  {name:'うみべ',bg:'#b2ebf2',wall:'#4dd0e1',floor:'#e0f7fa',accent:'#26c6da',deco:'🐚'},
  {name:'おしろ',bg:'#fff9c4',wall:'#ffd54f',floor:'#fffde7',accent:'#ffca28',deco:'👑'}
];
function getTheme(){return THEMES[(floor-1)%THEMES.length]}

/* ===== MAP ===== */
function generateRoom(fl){
  const map=[];
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(r===0||r===ROWS-1||c===0||c===COLS-1)map.push(1);
    else map.push(0);
  }
  const pillars=2+Math.min(fl,6);
  const seed=fl*7+13;
  let s=seed;
  function pRnd(){s=(s*16807+11)%2147483647;return(s&0x7fffffff)/2147483647}
  for(let i=0;i<pillars;i++){
    let tries=0,pc,pr;
    do{pc=2+Math.floor(pRnd()*(COLS-4));pr=2+Math.floor(pRnd()*(ROWS-4));tries++}
    while(tries<30&&(tileAt(map,pc,pr)===1||tileAt(map,pc-1,pr)===1||tileAt(map,pc+1,pr)===1||tileAt(map,pc,pr-1)===1||tileAt(map,pc,pr+1)===1||(Math.abs(pc-10)<3&&Math.abs(pr-5)<3)));
    if(tries<30){map[pr*COLS+pc]=1;if(pc+1<COLS-1&&pRnd()>0.4)map[pr*COLS+pc+1]=1}
  }
  return map;
}

/* ===== PARTICLES ===== */
let particles=[];
function addParticle(x,y,type,count){
  for(let i=0;i<(count||1);i++){
    const a=rnd(0,Math.PI*2),sp=rnd(30,120);
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,maxLife:rnd(0.3,0.7),type,size:rnd(3,8),color:type==='star'?['#ffeb3b','#ff9800','#e91e63','#9c27b0'][rndInt(0,3)]:type==='poof'?['#f8bbd0','#e1bee7','#fff9c4'][rndInt(0,2)]:'#fff'});
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    p.vy+=200*dt;p.vx*=0.97;
    p.life-=dt/p.maxLife;
    if(p.life<=0)particles.splice(i,1);
  }
}
function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha=Math.max(0,p.life);
    if(p.type==='star'){
      ctx.fillStyle=p.color;
      drawStar(p.x,p.y,p.size,p.size*0.4,5);
    }else{
      ctx.fillStyle=p.color;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();
    }
  }
  ctx.globalAlpha=1;
}
function drawStar(cx,cy,or,ir,n){
  ctx.beginPath();
  for(let i=0;i<n*2;i++){
    const a=-Math.PI/2+i*Math.PI/n,r=i%2===0?or:ir;
    if(i===0)ctx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
    else ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
  }
  ctx.closePath();ctx.fill();
}

/* ===== DAMAGE NUMBERS ===== */
let dmgNums=[];
function addDmgNum(x,y,val,color){dmgNums.push({x,y,val,color:color||'#fff',life:0.8,vy:-60})}
function updateDmgNums(dt){
  for(let i=dmgNums.length-1;i>=0;i--){
    const d=dmgNums[i];d.y+=d.vy*dt;d.vy*=0.95;d.life-=dt;
    if(d.life<=0)dmgNums.splice(i,1);
  }
}
function drawDmgNums(){
  for(const d of dmgNums){
    ctx.globalAlpha=clamp(d.life/0.3,0,1);
    ctx.fillStyle=d.color;ctx.font='bold 16px sans-serif';ctx.textAlign='center';
    ctx.fillText(d.val,d.x,d.y);
  }
  ctx.globalAlpha=1;
}

/* ===== SCREEN SHAKE ===== */
let shakeTimer=0,shakeIntensity=0;
function doShake(intensity,dur){shakeIntensity=intensity;shakeTimer=dur}

/* ===== HITSTOP (Poyon Stop) ===== */
let hitstopTimer=0;
function doHitstop(frames){hitstopTimer=Math.max(hitstopTimer,frames)}

/* ===== GAME STATE ===== */
let gameState='title'; // title,playing,waveWait,floorClear,blessing,clear,dead
let floor=1,wave=0,score=0,roomMap=[],enemies=[],items=[],projectiles=[];
let waveTimer=0,fadeAlpha=0,fadeDir=0;
let blessingChoices=[],selectCursor=0;

/* ===== PLAYER ===== */
let player={
  x:TILE*10,y:TILE*5,w:36,h:36,speed:200,hp:5,maxHp:5,atk:1,
  dir:'down',attacking:false,atkTimer:0,atkCd:0,
  dashing:false,dashTimer:0,dashCd:0,dashSpeed:550,
  iframes:0,face:'normal',
  squashX:1,squashY:1,squashVX:0,squashVY:0,
  bobTimer:0,wingTimer:0,breathTimer:0,
  blessings:[],magnetRange:60,pollen:0
};

/* ===== WEAPONS ===== */
const WEAPONS=[
  {name:'ハニーワンド',range:44,arc:Math.PI/2,dur:0.12,cd:0.25,dmg:1,desc:'バランス型'},
];
let currentWeapon=WEAPONS[0];

/* ===== ENEMY DEFINITIONS ===== */
const ENEMY_DEFS={
  imomushi:{name:'いもむし',hp:3,speed:40,dmg:1,score:10,type:'wander',color:'#8bc34a',bodyColor:'#689f38'},
  tentou:{name:'てんとう',hp:4,speed:75,dmg:1,score:15,type:'chase',color:'#f44336',bodyColor:'#d32f2f'},
  kabuto:{name:'かぶとむし',hp:6,speed:40,dmg:2,score:25,type:'charge',color:'#795548',bodyColor:'#5d4037',chargeSpeed:350,telegraphDur:0.6,chargeDur:0.3}
};

/* ===== WAVES ===== */
function buildWaves(fl){
  const s=1+fl*0.12;
  return[
    [{type:'imomushi',count:3}],
    [{type:'imomushi',count:2},{type:'tentou',count:1}],
    [{type:'tentou',count:2},{type:'imomushi',count:2}],
    [{type:'tentou',count:2},{type:'kabuto',count:1}],
    [{type:'kabuto',count:1},{type:'tentou',count:2},{type:'imomushi',count:2}]
  ];
}
let WAVES=[];

/* ===== BLESSINGS (Synergy type) ===== */
const BLESSING_POOL=[
  {id:'dashStrike',name:'ダッシュ斬り',desc:'ダッシュ直後の攻撃ダメージ2倍',icon:'💨',rarity:'common'},
  {id:'comboHeal',name:'コンボ回復',desc:'3体連続キルでHP1回復',icon:'💗',rarity:'common'},
  {id:'wallCrush',name:'壁ドン',desc:'壁際の敵にダメージ1.5倍',icon:'🧱',rarity:'common'},
  {id:'lastStand',name:'ラストスタンド',desc:'HP1の時、攻撃速度2倍',icon:'🔥',rarity:'rare'},
  {id:'sweetTooth',name:'あまいもの好き',desc:'回復アイテムの効果2倍',icon:'🍯',rarity:'common'},
  {id:'pollenMagnet',name:'はなふんマグネット',desc:'花粉の吸引範囲3倍',icon:'🧲',rarity:'common'},
  {id:'critWing',name:'羽ばたきクリティカル',desc:'移動中の攻撃が20%でクリティカル',icon:'✨',rarity:'rare'},
  {id:'thornAura',name:'とげオーラ',desc:'被弾時、周囲の敵に1ダメージ',icon:'🌹',rarity:'rare'},
  {id:'honeyTrap',name:'ハニートラップ',desc:'キル時に蜂蜜を落とし、踏んだ敵が減速',icon:'🍯',rarity:'epic'},
  {id:'queenBee',name:'女王蜂',desc:'全ステータス微増＋味方蜂を1匹召喚',icon:'👑',rarity:'epic'},
];

function pickBlessings(){
  const pool=[...BLESSING_POOL].filter(b=>!player.blessings.find(pb=>pb.id===b.id));
  const picked=[];
  while(picked.length<3&&pool.length>0){
    const idx=rndInt(0,pool.length-1);
    picked.push(pool.splice(idx,1)[0]);
  }
  return picked;
}
function applyBlessing(b){
  player.blessings.push(b);
  if(b.id==='pollenMagnet')player.magnetRange=180;
}
function hasBlessing(id){return player.blessings.some(b=>b.id===id)}

/* ===== COLLISION ===== */
function moveWithCollision(ent,dx,dy){
  const nx=ent.x+dx,ny=ent.y+dy;
  const hw=ent.w/2,hh=ent.h/2;
  const c1=Math.floor((nx-hw)/TILE),c2=Math.floor((nx+hw-1)/TILE);
  const r1=Math.floor((ny-hh)/TILE),r2=Math.floor((ny+hh-1)/TILE);
  let blocked=false;
  for(let r=r1;r<=r2;r++)for(let c=c1;c<=c2;c++){if(tileAt(roomMap,c,r)===1){blocked=true;break}}
  if(!blocked){ent.x=nx;ent.y=ny}
  else{
    // Try X only
    const cx1=Math.floor((nx-hw)/TILE),cx2=Math.floor((nx+hw-1)/TILE);
    const ry1=Math.floor((ent.y-hh)/TILE),ry2=Math.floor((ent.y+hh-1)/TILE);
    let xOk=true;
    for(let r=ry1;r<=ry2;r++)for(let c=cx1;c<=cx2;c++){if(tileAt(roomMap,c,r)===1){xOk=false;break}}
    if(xOk)ent.x=nx;
    // Try Y only
    const cy1=Math.floor((ent.x-hw)/TILE),cy2=Math.floor((ent.x+hw-1)/TILE);
    const rn1=Math.floor((ny-hh)/TILE),rn2=Math.floor((ny+hh-1)/TILE);
    let yOk=true;
    for(let r=rn1;r<=rn2;r++)for(let c=cy1;c<=cy2;c++){if(tileAt(roomMap,c,r)===1){yOk=false;break}}
    if(yOk)ent.y=ny;
  }
  ent.x=clamp(ent.x,ent.w/2,CW-ent.w/2);
  ent.y=clamp(ent.y,ent.h/2,CH-ent.h/2);
}

/* ===== SPAWN ===== */
function randEnemyPos(){
  let c,r,tries=0;
  do{c=rndInt(2,COLS-3);r=rndInt(2,ROWS-3);tries++}
  while(tries<30&&(tileAt(roomMap,c,r)===1||tileAt(roomMap,c-1,r)===1||tileAt(roomMap,c+1,r)===1||tileAt(roomMap,c,r-1)===1||tileAt(roomMap,c,r+1)===1||(Math.abs(c-10)<3&&Math.abs(r-5)<3)));
  return{x:c*TILE+TILE/2,y:r*TILE+TILE/2};
}
function spawnWave(){
  if(wave>=WAVES.length)return;
  const w=WAVES[wave];
  for(const g of w){
    const def=ENEMY_DEFS[g.type];
    for(let i=0;i<g.count;i++){
      const pos=randEnemyPos();
      const sc=1+floor*0.12;
      enemies.push({
        ...pos,w:32,h:32,hp:Math.ceil(def.hp*sc),maxHp:Math.ceil(def.hp*sc),
        speed:def.speed,dmg:def.dmg,score:def.score,type:def.type,defKey:g.type,
        color:def.color,bodyColor:def.bodyColor,
        dir:rnd(0,Math.PI*2),wanderTimer:rnd(0.5,2),
        charging:false,telegraphing:false,telegraphTimer:0,chargeTimer:0,chargeCd:0,chargeDir:0,
        flashTimer:0,squashX:1,squashY:1,stunTimer:0,
        chargeSpeed:def.chargeSpeed||0,telegraphDur:def.telegraphDur||0,chargeDur:def.chargeDur||0,
        wobble:0,wobbleSpeed:rnd(3,6),face:'normal'
      });
    }
  }
}

/* ===== ITEMS ===== */
function dropItem(x,y){
  const r=Math.random();
  if(r<0.3)items.push({x,y,type:'pollen',life:8,w:12,h:12,bobTimer:Math.random()*10});
  else if(r<0.15)items.push({x,y,type:'heal',life:8,w:14,h:14,bobTimer:Math.random()*10});
}

/* ===== RESET ===== */
let comboKills=0,comboTimer=0;
function resetGame(){
  floor=1;wave=0;score=0;
  player.x=TILE*10;player.y=TILE*5;player.hp=5;player.maxHp=5;player.atk=1;
  player.speed=200;player.blessings=[];player.magnetRange=60;player.pollen=0;
  player.attacking=false;player.atkTimer=0;player.atkCd=0;
  player.dashing=false;player.dashTimer=0;player.dashCd=0;
  player.iframes=0;player.dir='down';player.face='normal';
  player.squashX=1;player.squashY=1;
  currentWeapon=WEAPONS[0];
  comboKills=0;comboTimer=0;
  particles=[];dmgNums=[];items=[];projectiles=[];enemies=[];
  roomMap=generateRoom(floor);
  WAVES=buildWaves(floor);
  spawnWave();
  gameState='playing';
}

function startFloor(){
  wave=0;
  player.x=TILE*10;player.y=TILE*5;
  enemies=[];items=[];projectiles=[];particles=[];
  roomMap=generateRoom(floor);
  WAVES=buildWaves(floor);
  spawnWave();
  gameState='playing';
}

/* ===== DRAW HELPERS ===== */
function drawTiles(){
  const th=getTheme();
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const x=c*TILE,y=r*TILE;
    if(tileAt(roomMap,c,r)===1){
      ctx.fillStyle=th.wall;ctx.fillRect(x,y,TILE,TILE);
      ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(x,y+TILE-4,TILE,4);
      // Deco
      if((c+r)%5===0){ctx.font='12px sans-serif';ctx.fillText(th.deco,x+8,y+30)}
    }else{
      ctx.fillStyle=th.floor;ctx.fillRect(x,y,TILE,TILE);
      if((c+r)%7===0){ctx.fillStyle=th.bg;ctx.beginPath();ctx.arc(x+24,y+24,3,0,Math.PI*2);ctx.fill()}
    }
  }
}

/* ===== DRAW PLAYER ===== */
function drawPlayer(){
  const p=player;
  // Iframes blink
  if(p.iframes>0&&Math.floor(p.iframes*15)%2===0)return;
  
  ctx.save();
  ctx.translate(p.x,p.y);
  
  // Squash & stretch
  ctx.scale(p.squashX,p.squashY);
  
  // Bob animation (bounce while moving)
  const bob=Math.sin(p.bobTimer*10)*2;
  ctx.translate(0,bob);
  
  if(spriteLoaded){
    const frame=SPRITE_FRAMES[p.dir]||SPRITE_FRAMES.down;
    const drawSize=44;
    // Draw sprite
    ctx.drawImage(spriteImg,frame.sx,frame.sy,frame.sw,frame.sh,-drawSize/2,-drawSize/2,drawSize,drawSize);
    
    // Wing flutter overlay (scale wings area)
    const wingScale=0.5+Math.sin(p.wingTimer*20)*0.3;
    // We simulate wing flutter by drawing a subtle transparent wing on top
    ctx.globalAlpha=0.3;
    ctx.fillStyle='#bbdefb';
    const ws=10*wingScale;
    ctx.beginPath();ctx.ellipse(-16,0,ws,6,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(16,0,ws,6,0,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    
    // Iframes rainbow overlay
    if(p.iframes>0){
      ctx.globalCompositeOperation='source-atop';
      ctx.fillStyle=`hsla(${Date.now()%360},80%,70%,0.3)`;
      ctx.fillRect(-drawSize/2,-drawSize/2,drawSize,drawSize);
      ctx.globalCompositeOperation='source-over';
    }
  }else{
    // Fallback: draw cute circle
    ctx.fillStyle='#ffd54f';
    ctx.beginPath();ctx.arc(0,0,18,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#5d4037';
    ctx.beginPath();ctx.arc(-5,-3,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(5,-3,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#e91e63';
    ctx.beginPath();ctx.arc(0,4,2,0,Math.PI,false);ctx.fill();
  }
  
  // Dash trail effect
  if(p.dashing){
    ctx.globalAlpha=0.2;
    ctx.fillStyle='#bbdefb';
    ctx.beginPath();ctx.arc(0,0,24,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
  
  ctx.restore();
  
  // Attack effect
  if(p.attacking){
    const dirs={down:{x:0,y:1},up:{x:0,y:-1},left:{x:-1,y:0},right:{x:1,y:0}};
    const d=dirs[p.dir];
    const ax=p.x+d.x*30,ay=p.y+d.y*30;
    // Cute star slash
    ctx.fillStyle='#ffeb3b';
    ctx.globalAlpha=0.7;
    drawStar(ax,ay,14,6,4);
    ctx.globalAlpha=1;
    // Sparkle
    ctx.fillStyle='#fff';
    drawStar(ax+rnd(-8,8),ay+rnd(-8,8),4,2,4);
  }
}

/* ===== DRAW ENEMIES ===== */
function drawEnemy(en){
  ctx.save();
  ctx.translate(en.x,en.y);
  ctx.scale(en.squashX,en.squashY);
  
  // Flash on hit
  if(en.flashTimer>0){
    ctx.globalAlpha=0.5+Math.sin(en.flashTimer*30)*0.5;
  }
  
  const wb=Math.sin(en.wobble)*3;
  
  if(en.defKey==='imomushi'){
    // Caterpillar: green segmented body
    ctx.fillStyle=en.color;
    // Body segments
    for(let i=0;i<4;i++){
      const sx=-10+i*7,sy=wb*(i%2===0?1:-1);
      ctx.beginPath();ctx.arc(sx,sy,8-i*0.5,0,Math.PI*2);ctx.fill();
    }
    // Darker overlay on back segments
    ctx.fillStyle=en.bodyColor;
    for(let i=1;i<4;i++){
      const sx=-10+i*7,sy=wb*(i%2===0?1:-1);
      ctx.beginPath();ctx.arc(sx,sy+2,5,0,Math.PI);ctx.fill();
    }
    // Eyes
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(-13,-3,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(-7,-3,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#333';
    ctx.beginPath();ctx.arc(-12,-3,2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(-6,-3,2,0,Math.PI*2);ctx.fill();
    // Antennae
    ctx.strokeStyle='#689f38';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(-14,-7);ctx.lineTo(-17,-14);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-8,-7);ctx.lineTo(-5,-14);ctx.stroke();
    ctx.fillStyle='#cddc39';
    ctx.beginPath();ctx.arc(-17,-14,2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(-5,-14,2,0,Math.PI*2);ctx.fill();
    // Cheeks
    ctx.fillStyle='rgba(255,138,128,0.4)';
    ctx.beginPath();ctx.arc(-15,2,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(-3,2,3,0,Math.PI*2);ctx.fill();
  }
  else if(en.defKey==='tentou'){
    // Ladybug
    ctx.fillStyle=en.color;
    ctx.beginPath();ctx.ellipse(0,2,14,12,0,0,Math.PI*2);ctx.fill();
    // Shell line
    ctx.strokeStyle='#333';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(0,-10);ctx.lineTo(0,14);ctx.stroke();
    // Spots
    ctx.fillStyle='#333';
    ctx.beginPath();ctx.arc(-6,-1,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(6,-1,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(-4,7,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(4,7,2.5,0,Math.PI*2);ctx.fill();
    // Head
    ctx.fillStyle='#333';
    ctx.beginPath();ctx.arc(0,-8,7,Math.PI,0);ctx.fill();
    // Eyes
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(-3,-10,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(3,-10,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=en.face==='angry'?'#f44336':'#333';
    ctx.beginPath();ctx.arc(-3,-10,1.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(3,-10,1.5,0,Math.PI*2);ctx.fill();
    // Antennae
    ctx.strokeStyle='#333';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(-3,-14);ctx.lineTo(-6,-20);ctx.stroke();
    ctx.beginPath();ctx.moveTo(3,-14);ctx.lineTo(6,-20);ctx.stroke();
    ctx.fillStyle='#333';
    ctx.beginPath();ctx.arc(-6,-20,1.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(6,-20,1.5,0,Math.PI*2);ctx.fill();
    // Legs
    ctx.strokeStyle='#333';ctx.lineWidth=1.5;
    [-8,-2,4].forEach(yo=>{
      ctx.beginPath();ctx.moveTo(-13,yo);ctx.lineTo(-18,yo+4);ctx.stroke();
      ctx.beginPath();ctx.moveTo(13,yo);ctx.lineTo(18,yo+4);ctx.stroke();
    });
  }
  else if(en.defKey==='kabuto'){
    // Beetle with horn
    ctx.fillStyle=en.color;
    ctx.beginPath();ctx.ellipse(0,4,16,14,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=en.bodyColor;
    ctx.beginPath();ctx.ellipse(0,8,14,8,0,0,Math.PI);ctx.fill();
    // Horn
    ctx.fillStyle='#5d4037';
    ctx.beginPath();ctx.moveTo(-3,-10);ctx.lineTo(0,-24);ctx.lineTo(3,-10);ctx.closePath();ctx.fill();
    // Fork on horn
    ctx.beginPath();ctx.moveTo(-4,-18);ctx.lineTo(0,-22);ctx.lineTo(4,-18);ctx.stroke();
    // Eyes
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(-5,-4,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(5,-4,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=en.telegraphing?'#f44336':'#333';
    ctx.beginPath();ctx.arc(-5,-4,2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(5,-4,2,0,Math.PI*2);ctx.fill();
    // Telegraph "!"
    if(en.telegraphing){
      ctx.fillStyle='#f44336';ctx.font='bold 18px sans-serif';ctx.textAlign='center';
      ctx.fillText('!',0,-30);
    }
    // Stun stars
    if(en.stunTimer>0){
      for(let i=0;i<3;i++){
        const a=Date.now()/200+i*Math.PI*2/3;
        ctx.fillStyle='#ffeb3b';
        drawStar(Math.cos(a)*12,-14+Math.sin(a)*4,4,2,5);
      }
    }
    // Legs
    ctx.strokeStyle='#5d4037';ctx.lineWidth=2;
    [-6,0,6].forEach(yo=>{
      ctx.beginPath();ctx.moveTo(-15,yo+4);ctx.lineTo(-20,yo+10);ctx.stroke();
      ctx.beginPath();ctx.moveTo(15,yo+4);ctx.lineTo(20,yo+10);ctx.stroke();
    });
  }
  
  ctx.globalAlpha=1;
  ctx.restore();
  
  // HP bar
  if(en.hp<en.maxHp){
    const bw=28,bh=4,bx=en.x-bw/2,by=en.y-22;
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle='#ef5350';ctx.fillRect(bx,by,bw*(en.hp/en.maxHp),bh);
    ctx.fillStyle='#fff';ctx.fillRect(bx,by,bw*(en.hp/en.maxHp),1);
  }
}

/* ===== DRAW ITEMS ===== */
function drawItems(){
  for(const it of items){
    const bob=Math.sin(it.bobTimer*4)*3;
    if(it.type==='pollen'){
      ctx.fillStyle='#ffeb3b';
      drawStar(it.x,it.y+bob,6,3,6);
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(it.x,it.y+bob,2,0,Math.PI*2);ctx.fill();
    }else if(it.type==='heal'){
      ctx.fillStyle='#e91e63';
      // Heart shape
      const hx=it.x,hy=it.y+bob;
      ctx.beginPath();
      ctx.moveTo(hx,hy+4);
      ctx.bezierCurveTo(hx-7,hy-3,hx-7,hy-8,hx,hy-5);
      ctx.bezierCurveTo(hx+7,hy-8,hx+7,hy-3,hx,hy+4);
      ctx.fill();
    }
  }
}

/* ===== HUD ===== */
function drawHUD(){
  // HP hearts
  for(let i=0;i<player.maxHp;i++){
    const hx=12+i*22,hy=12;
    ctx.fillStyle=i<player.hp?'#e91e63':'#424242';
    ctx.beginPath();
    ctx.moveTo(hx,hy+5);
    ctx.bezierCurveTo(hx-8,hy-4,hx-8,hy-10,hx,hy-6);
    ctx.bezierCurveTo(hx+8,hy-10,hx+8,hy-4,hx,hy+5);
    ctx.fill();
    if(i<player.hp){ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.arc(hx-2,hy-5,2,0,Math.PI*2);ctx.fill()}
  }
  
  // Floor & Wave
  ctx.fillStyle='#fff';ctx.font='bold 13px sans-serif';ctx.textAlign='left';
  ctx.fillText(`Floor ${floor}  Wave ${wave+1}/${WAVES.length}`,12,32);
  
  // Score & Pollen
  ctx.textAlign='right';
  ctx.fillText(`⭐${score}  🌸${player.pollen}`,CW-12,20);
  
  // Blessings icons
  ctx.textAlign='left';
  player.blessings.forEach((b,i)=>{
    ctx.font='16px sans-serif';ctx.fillText(b.icon,12+i*22,52);
  });
  
  // Controls hint
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='11px sans-serif';ctx.textAlign='center';
  ctx.fillText('WASD:移動  Z:攻撃  X:ダッシュ',CW/2,CH-8);
}

/* ===== UPDATE ===== */
let lastTime=0;
function update(dt){
  // Hitstop
  if(hitstopTimer>0){hitstopTimer-=dt*60;return}
  
  if(gameState==='title'){
    if(wasPressed('KeyZ')){resetGame();seSelect()}
    return;
  }
  if(gameState==='dead'){
    if(wasPressed('KeyZ')){resetGame();seSelect()}
    return;
  }
  if(gameState==='clear'){
    if(wasPressed('KeyZ')){gameState='title';seSelect()}
    return;
  }
  if(gameState==='blessing'){
    if(wasPressed('ArrowLeft')||wasPressed('KeyA'))selectCursor=(selectCursor+2)%3;
    if(wasPressed('ArrowRight')||wasPressed('KeyD'))selectCursor=(selectCursor+1)%3;
    if(wasPressed('KeyZ')&&blessingChoices[selectCursor]){
      applyBlessing(blessingChoices[selectCursor]);
      seBless();
      floor++;
      startFloor();
    }
    return;
  }
  if(gameState==='waveWait'){
    waveTimer-=dt;
    if(waveTimer<=0){spawnWave();gameState='playing'}
    return;
  }
  if(gameState==='floorClear'){
    waveTimer-=dt;
    if(waveTimer<=0){
      if(floor>=5){gameState='clear';seClear();return}
      blessingChoices=pickBlessings();selectCursor=0;
      gameState='blessing';
    }
    return;
  }
  
  // === PLAYING ===
  const p=player;
  
  // Timers
  if(p.atkCd>0)p.atkCd-=dt;
  if(p.dashCd>0)p.dashCd-=dt;
  if(p.iframes>0)p.iframes-=dt;
  if(comboTimer>0){comboTimer-=dt;if(comboTimer<=0)comboKills=0}
  p.bobTimer+=dt;p.wingTimer+=dt;p.breathTimer+=dt;
  
  // Squash recovery
  p.squashX=lerp(p.squashX,1,dt*12);
  p.squashY=lerp(p.squashY,1,dt*12);
  
  // Movement
  let mx=0,my=0;
  if(isDown('KeyA')||isDown('ArrowLeft'))mx=-1;
  if(isDown('KeyD')||isDown('ArrowRight'))mx=1;
  if(isDown('KeyW')||isDown('ArrowUp'))my=-1;
  if(isDown('KeyS')||isDown('ArrowDown'))my=1;
  
  if(mx||my){
    const len=Math.hypot(mx,my);mx/=len;my/=len;
    if(Math.abs(mx)>Math.abs(my))p.dir=mx>0?'right':'left';
    else p.dir=my>0?'down':'up';
    
    const spd=p.dashing?p.dashSpeed:p.speed;
    moveWithCollision(p,mx*spd*dt,my*spd*dt);
    
    // Walking squash
    if(!p.dashing){p.squashX=1+Math.sin(p.bobTimer*15)*0.04;p.squashY=1-Math.sin(p.bobTimer*15)*0.04}
  }
  
  // Dash
  if(wasPressed('KeyX')&&p.dashCd<=0&&!p.dashing){
    p.dashing=true;p.dashTimer=0.15;p.dashCd=0.4;p.iframes=0.2;
    p.squashX=1.3;p.squashY=0.7;
    seDash();
  }
  if(p.dashing){
    p.dashTimer-=dt;
    if(p.dashTimer<=0){p.dashing=false;p.squashX=0.85;p.squashY=1.15}
  }
  
  // Attack
  if(wasPressed('KeyZ')&&p.atkCd<=0&&!p.attacking){
    p.attacking=true;p.atkTimer=currentWeapon.dur;
    const cdMult=(hasBlessing('lastStand')&&p.hp===1)?0.5:1;
    p.atkCd=currentWeapon.cd*cdMult;
    p.squashX=0.8;p.squashY=1.2;
    seAttack();
    
    // Hit check
    const dirs={down:{x:0,y:1},up:{x:0,y:-1},left:{x:-1,y:0},right:{x:1,y:0}};
    const d=dirs[p.dir];
    const ax=p.x+d.x*24,ay=p.y+d.y*24;
    
    for(const en of enemies){
      if(dist({x:ax,y:ay},en)<currentWeapon.range){
        let dmg=p.atk+currentWeapon.dmg;
        // Blessing: dashStrike
        if(hasBlessing('dashStrike')&&p.dashCd>0.2)dmg*=2;
        // Blessing: wallCrush
        if(hasBlessing('wallCrush')){
          const ec=Math.floor(en.x/TILE),er=Math.floor(en.y/TILE);
          if(tileAt(roomMap,ec-1,er)===1||tileAt(roomMap,ec+1,er)===1||tileAt(roomMap,ec,er-1)===1||tileAt(roomMap,ec,er+1)===1)dmg=Math.ceil(dmg*1.5);
        }
        // Blessing: critWing
        if(hasBlessing('critWing')&&(mx||my)&&Math.random()<0.2){dmg*=2;addParticle(en.x,en.y,'star',5)}
        
        en.hp-=dmg;
        en.flashTimer=0.15;
        en.squashX=1.3;en.squashY=0.7;
        seHit();
        doHitstop(3);
        doShake(3,0.08);
        addDmgNum(en.x,en.y-10,dmg,'#fff');
        addParticle(en.x,en.y,'star',3);
        
        // Knockback
        const angle=Math.atan2(en.y-p.y,en.x-p.x);
        moveWithCollision(en,Math.cos(angle)*20,Math.sin(angle)*20);
      }
    }
  }
  if(p.attacking){
    p.atkTimer-=dt;
    if(p.atkTimer<=0){p.attacking=false;
      // Attack cancel with dash allowed during atkCd
    }
  }
  
  // Update enemies
  for(let i=enemies.length-1;i>=0;i--){
    const en=enemies[i];
    en.wobble+=dt*en.wobbleSpeed;
    en.squashX=lerp(en.squashX,1,dt*10);
    en.squashY=lerp(en.squashY,1,dt*10);
    if(en.flashTimer>0)en.flashTimer-=dt;
    if(en.stunTimer>0){en.stunTimer-=dt;continue}
    
    // AI
    if(en.type==='wander'){
      en.wanderTimer-=dt;
      if(en.wanderTimer<=0){en.dir=rnd(0,Math.PI*2);en.wanderTimer=rnd(1,3)}
      moveWithCollision(en,Math.cos(en.dir)*en.speed*dt,Math.sin(en.dir)*en.speed*dt);
    }
    else if(en.type==='chase'){
      const a=Math.atan2(p.y-en.y,p.x-en.x);
      en.face=dist(en,p)<150?'angry':'normal';
      const spd=en.face==='angry'?en.speed*1.3:en.speed;
      moveWithCollision(en,Math.cos(a)*spd*dt,Math.sin(a)*spd*dt);
    }
    else if(en.type==='charge'){
      if(en.chargeCd>0){en.chargeCd-=dt;continue}
      if(!en.telegraphing&&!en.charging){
        if(dist(en,p)<200){en.telegraphing=true;en.telegraphTimer=en.telegraphDur;en.face='angry'}
        else{
          en.wanderTimer-=dt;
          if(en.wanderTimer<=0){en.dir=rnd(0,Math.PI*2);en.wanderTimer=rnd(1,3)}
          moveWithCollision(en,Math.cos(en.dir)*en.speed*dt,Math.sin(en.dir)*en.speed*dt);
        }
      }
      if(en.telegraphing){
        en.telegraphTimer-=dt;
        en.squashX=1+Math.sin(en.telegraphTimer*20)*0.1;
        if(en.telegraphTimer<=0){
          en.telegraphing=false;en.charging=true;en.chargeTimer=en.chargeDur;
          en.chargeDir=Math.atan2(p.y-en.y,p.x-en.x);
        }
      }
      if(en.charging){
        en.chargeTimer-=dt;
        moveWithCollision(en,Math.cos(en.chargeDir)*en.chargeSpeed*dt,Math.sin(en.chargeDir)*en.chargeSpeed*dt);
        if(en.chargeTimer<=0){en.charging=false;en.chargeCd=2;en.stunTimer=0.8;en.face='normal'}
      }
    }
    
    // Enemy-player collision
    if(p.iframes<=0&&rectOverlap(
      {x:p.x-p.w/2,y:p.y-p.h/2,w:p.w,h:p.h},
      {x:en.x-en.w/2,y:en.y-en.h/2,w:en.w,h:en.h}
    )){
      p.hp-=en.dmg;
      p.iframes=1;
      seHurt();
      doShake(5,0.15);
      p.squashX=0.6;p.squashY=1.4;
      addDmgNum(p.x,p.y-20,en.dmg,'#e91e63');
      const angle=Math.atan2(p.y-en.y,p.x-en.x);
      moveWithCollision(p,Math.cos(angle)*30,Math.sin(angle)*30);
      
      // Blessing: thornAura
      if(hasBlessing('thornAura')){
        for(const e2 of enemies){
          if(dist(p,e2)<80){e2.hp-=1;e2.flashTimer=0.1;addParticle(e2.x,e2.y,'star',2)}
        }
      }
      
      if(p.hp<=0){gameState='dead';p.face='hurt'}
    }
    
    // Enemy death
    if(en.hp<=0){
      score+=en.score;
      seKill();
      addParticle(en.x,en.y,'poof',8);
      addParticle(en.x,en.y,'star',5);
      doShake(2,0.05);
      dropItem(en.x,en.y);
      
      // Combo tracking
      comboKills++;comboTimer=2;
      if(hasBlessing('comboHeal')&&comboKills>=3){
        p.hp=Math.min(p.hp+1,p.maxHp);comboKills=0;
        addDmgNum(p.x,p.y-30,'+1HP','#e91e63');
      }
      
      enemies.splice(i,1);
    }
  }
  
  // Items
  for(let i=items.length-1;i>=0;i--){
    const it=items[i];
    it.bobTimer+=dt;it.life-=dt;
    // Magnet
    if(it.type==='pollen'&&dist(p,it)<p.magnetRange){
      const a=Math.atan2(p.y-it.y,p.x-it.x);
      it.x+=Math.cos(a)*300*dt;it.y+=Math.sin(a)*300*dt;
    }
    // Pickup
    if(dist(p,it)<20){
      if(it.type==='pollen'){p.pollen++;score+=5}
      else if(it.type==='heal'){
        const healAmt=hasBlessing('sweetTooth')?2:1;
        p.hp=Math.min(p.hp+healAmt,p.maxHp);
      }
      items.splice(i,1);continue;
    }
    if(it.life<=0)items.splice(i,1);
  }
  
  // Wave check
  if(enemies.length===0&&gameState==='playing'){
    wave++;
    if(wave>=WAVES.length){
      gameState='floorClear';waveTimer=1.5;seClear();
    }else{
      gameState='waveWait';waveTimer=1;
    }
  }
  
  // Particles & dmg nums
  updateParticles(dt);
  updateDmgNums(dt);
  if(shakeTimer>0)shakeTimer-=dt;
}

/* ===== DRAW ===== */
function draw(){
  ctx.save();
  
  // Screen shake
  if(shakeTimer>0){
    ctx.translate(rnd(-shakeIntensity,shakeIntensity),rnd(-shakeIntensity,shakeIntensity));
  }
  
  // Background
  const th=getTheme();
  ctx.fillStyle=th.bg;ctx.fillRect(0,0,CW,CH);
  
  if(gameState==='title'){
    drawTitleScreen();ctx.restore();return;
  }
  
  drawTiles();
  drawItems();
  
  // Sort and draw enemies
  enemies.forEach(en=>drawEnemy(en));
  drawPlayer();
  drawParticles();
  drawDmgNums();
  drawHUD();
  
  // Wave wait overlay
  if(gameState==='waveWait'){
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(0,0,CW,CH);
    ctx.fillStyle='#fff';ctx.font='bold 28px sans-serif';ctx.textAlign='center';
    ctx.fillText(`Wave ${wave+1}`,CW/2,CH/2);
  }
  
  // Floor clear overlay
  if(gameState==='floorClear'){
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(0,0,CW,CH);
    ctx.fillStyle='#ffeb3b';ctx.font='bold 32px sans-serif';ctx.textAlign='center';
    ctx.fillText(`Floor ${floor} クリア!`,CW/2,CH/2);
    ctx.fillStyle='#fff';ctx.font='16px sans-serif';
    ctx.fillText('✨ おめでとう! ✨',CW/2,CH/2+30);
  }
  
  // Blessing screen
  if(gameState==='blessing'){
    drawBlessingScreen();
  }
  
  // Dead
  if(gameState==='dead'){
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,CW,CH);
    ctx.fillStyle='#e91e63';ctx.font='bold 36px sans-serif';ctx.textAlign='center';
    ctx.fillText('ゲームオーバー',CW/2,CH/2-20);
    ctx.fillStyle='#fff';ctx.font='16px sans-serif';
    ctx.fillText(`スコア: ${score}  Floor: ${floor}`,CW/2,CH/2+15);
    ctx.fillText('Zキーでリトライ',CW/2,CH/2+40);
  }
  
  // Clear
  if(gameState==='clear'){
    ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(0,0,CW,CH);
    ctx.fillStyle='#ffeb3b';ctx.font='bold 36px sans-serif';ctx.textAlign='center';
    ctx.fillText('🎉 クリア! 🎉',CW/2,CH/2-20);
    ctx.fillStyle='#fff';ctx.font='18px sans-serif';
    ctx.fillText(`スコア: ${score}`,CW/2,CH/2+15);
    ctx.fillText('Zキーでタイトルへ',CW/2,CH/2+40);
  }
  
  ctx.restore();
}

function drawTitleScreen(){
  // Cute gradient bg
  const grd=ctx.createLinearGradient(0,0,0,CH);
  grd.addColorStop(0,'#fce4ec');grd.addColorStop(1,'#fff9c4');
  ctx.fillStyle=grd;ctx.fillRect(0,0,CW,CH);
  
  // Floating particles
  const t=Date.now()/1000;
  for(let i=0;i<8;i++){
    const x=CW/2+Math.sin(t+i*0.8)*200,y=100+Math.cos(t*0.7+i)*80+i*40;
    ctx.fillStyle='rgba(255,235,59,0.3)';
    drawStar(x,y,8,4,5);
  }
  
  // Sprite preview
  if(spriteLoaded){
    ctx.drawImage(spriteImg,0,0,250,250,CW/2-48,CH/2-100,96,96);
  }
  
  // Title
  ctx.fillStyle='#5d4037';ctx.font='bold 36px sans-serif';ctx.textAlign='center';
  ctx.fillText('ミプリンの冒険',CW/2,CH/2+30);
  ctx.fillStyle='#e91e63';ctx.font='18px sans-serif';
  ctx.fillText('~ Cute Roguelike ~',CW/2,CH/2+55);
  
  // Start prompt
  ctx.fillStyle=Math.sin(t*3)>0?'#5d4037':'#e91e63';
  ctx.font='bold 16px sans-serif';
  ctx.fillText('Zキーでスタート',CW/2,CH/2+100);
}

function drawBlessingScreen(){
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,CW,CH);
  ctx.fillStyle='#fff';ctx.font='bold 22px sans-serif';ctx.textAlign='center';
  ctx.fillText('🌸 祝福を選んでね 🌸',CW/2,80);
  
  const rarityColors={common:'#e0e0e0',rare:'#64b5f6',epic:'#ffd54f'};
  
  blessingChoices.forEach((b,i)=>{
    const bx=CW/2-200+i*180,by=130,bw=160,bh=200;
    const selected=i===selectCursor;
    
    // Card bg
    ctx.fillStyle=selected?'rgba(255,255,255,0.95)':'rgba(255,255,255,0.7)';
    // Rounded rect
    const r=12;
    ctx.beginPath();ctx.moveTo(bx+r,by);ctx.lineTo(bx+bw-r,by);ctx.quadraticCurveTo(bx+bw,by,bx+bw,by+r);
    ctx.lineTo(bx+bw,by+bh-r);ctx.quadraticCurveTo(bx+bw,by+bh,bx+bw-r,by+bh);
    ctx.lineTo(bx+r,by+bh);ctx.quadraticCurveTo(bx,by+bh,bx,by+bh-r);
    ctx.lineTo(bx,by+r);ctx.quadraticCurveTo(bx,by,bx+r,by);ctx.closePath();ctx.fill();
    
    // Border
    ctx.strokeStyle=selected?'#e91e63':rarityColors[b.rarity];
    ctx.lineWidth=selected?3:2;ctx.stroke();
    
    // Icon
    ctx.font='36px sans-serif';ctx.textAlign='center';
    ctx.fillText(b.icon,bx+bw/2,by+55);
    
    // Name
    ctx.fillStyle='#333';ctx.font='bold 14px sans-serif';
    ctx.fillText(b.name,bx+bw/2,by+85);
    
    // Rarity
    ctx.fillStyle=rarityColors[b.rarity];ctx.font='11px sans-serif';
    ctx.fillText(b.rarity.toUpperCase(),bx+bw/2,by+105);
    
    // Description (word wrap)
    ctx.fillStyle='#555';ctx.font='12px sans-serif';
    const words=b.desc;
    const maxW=bw-20;
    let line='',ly=by+125;
    for(const ch of words){
      if(ctx.measureText(line+ch).width>maxW){ctx.fillText(line,bx+bw/2,ly);ly+=16;line=ch}
      else line+=ch;
    }
    if(line)ctx.fillText(line,bx+bw/2,ly);
    
    // Selection indicator
    if(selected){
      ctx.fillStyle='#e91e63';ctx.font='12px sans-serif';
      ctx.fillText('▶ Zで選択 ◀',bx+bw/2,by+bh+20);
    }
  });
  
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='12px sans-serif';ctx.textAlign='center';
  ctx.fillText('← A / D → で選択',CW/2,CH-20);
}

/* ===== GAME LOOP ===== */
function loop(ts){
  const dt=Math.min((ts-(lastTime||ts))/1000,1/30);
  lastTime=ts;
  
  update(dt);
  draw();
  
  // Clear pressed
  for(const k in pressed)pressed[k]=false;
  
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
