<!DOCTYPE html>
<html lang="ja">
<head>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="assets/icon-192.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>ミプリンの冒険</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100dvh;height:100vh;
  background:#1a1a2e;overflow:hidden;
  display:flex;justify-content:center;align-items:center;
  overscroll-behavior:none;
  -webkit-overflow-scrolling:auto;
}
canvas{
  touch-action:none;-webkit-touch-callout:none;
  user-select:none;-webkit-user-select:none;
  background:#000;
  width:min(100vw, calc(100dvh * 4 / 3));
  height:min(calc(100vw * 3 / 4), 100dvh);
}
@supports not (height:100dvh){
  html,body{height:100vh}
  canvas{
    width:min(100vw, calc(100vh * 4 / 3));
    height:min(calc(100vw * 3 / 4), 100vh);
  }
}
/* PWA install banner */
#pwa-banner{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:9998;
  background:rgba(26,26,46,0.94);border-top:2px solid #ffd700;
  color:#ffd700;font:bold 14px 'M PLUS Rounded 1c',sans-serif;
  padding:10px 16px;text-align:center;line-height:1.5;
  backdrop-filter:blur(4px);
}
#pwa-banner.show{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
#pwa-add{background:#ffd700;color:#1a1a2e;border:none;border-radius:20px;
  padding:6px 18px;font:bold 14px 'M PLUS Rounded 1c',sans-serif;cursor:pointer}
#pwa-close{background:none;border:none;color:#aaa;font-size:18px;cursor:pointer;padding:0 4px;line-height:1}
/* Portrait overlay */
@media (orientation:portrait){
  body::after{
    content:'📱 横に回転してね！';
    position:fixed;top:0;left:0;right:0;bottom:0;
    background:rgba(26,26,46,0.95);
    color:#ffd700;
    font:bold 28px 'M PLUS Rounded 1c',sans-serif;
    display:flex;justify-content:center;align-items:center;
    z-index:9999;
    text-align:center;
    padding:40px;
    line-height:1.6;
  }
}
</style>
</head>
<body>
<canvas id="c" width="1280" height="960"></canvas>
<div id="pwa-banner">
  <span id="pwa-msg"></span>
  <button id="pwa-add" style="display:none">ホーム画面に追加</button>
  <button id="pwa-close">✕</button>
</div>
<script>
(function(){
  // スタンドアロン(インストール済み)なら表示しない
  if(window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) return;
  if(localStorage.getItem('pwa_dismissed')) return;
  var banner=document.getElementById('pwa-banner');
  var msg=document.getElementById('pwa-msg');
  var addBtn=document.getElementById('pwa-add');
  var closeBtn=document.getElementById('pwa-close');
  var deferredPrompt=null;
  var isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  function show(){
    if(isIOS){
      msg.textContent='📲 ホーム画面に追加するとアプリとして遊べるよ！ → 「共有」→「ホーム画面に追加」';
    } else {
      msg.textContent='📲 ホーム画面に追加してアプリとして遊ぼう！';
      if(deferredPrompt) addBtn.style.display='';
    }
    banner.classList.add('show');
  }
  window.addEventListener('beforeinstallprompt',function(e){
    e.preventDefault(); deferredPrompt=e;
    setTimeout(show, 4000);
  });
  if(isIOS) setTimeout(show, 4000);
  addBtn.addEventListener('click',function(){
    if(!deferredPrompt) return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function(){
      deferredPrompt=null;
      banner.classList.remove('show');
      localStorage.setItem('pwa_dismissed','1');
    });
  });
  closeBtn.addEventListener('click',function(){
    banner.classList.remove('show');
    localStorage.setItem('pwa_dismissed','1');
  });
  // Service Worker 登録
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  }
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/rot-js@2/dist/rot.js"></script>

</body>
